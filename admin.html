<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบจัดการหอพักสัมฤทธิ์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0B0C10;font-family:'IBM Plex Sans Thai',sans-serif;color:#E8EAF0;min-height:100vh;display:flex;}
#app{flex:1;min-width:0;}  /* fill the viewport so the content area isn't shrink-wrapped to ~content width */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#0B0C10;}
::-webkit-scrollbar-thumb{background:#2A2D3A;border-radius:3px;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* Sidebar */
.sidebar{width:220px;min-height:100vh;background:#0E1016;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.06);}
.sb-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(140deg,#7C5CE6,#5234B8);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.sb-logo-title{font-size:14px;font-weight:700;line-height:1.3;}
.sb-logo-sub{font-size:10px;color:#5C6270;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;margin-top:2px;}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;}
.sb-section{font-size:10px;color:#4A5060;font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding:12px 16px 4px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13.5px;color:#8A909E;cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.sb-item:hover{background:rgba(108,79,216,0.08);color:#C8CCDA;}
.sb-item.active{background:rgba(108,79,216,0.12);color:#A990FF;border-left-color:#6C4FD8;}
.sb-item svg{opacity:.7;flex-shrink:0;}
.sb-item.active svg{opacity:1;}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);}
.sb-user{display:flex;align-items:center;gap:10px;}
.sb-avatar{width:30px;height:30px;border-radius:8px;background:linear-gradient(140deg,#7C5CE6,#5234B8);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.sb-uname{font-size:13px;font-weight:600;}
.sb-urole{font-size:11px;color:#5C6270;}

/* Main */
.main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{height:56px;background:#0E1016;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:16px;font-weight:700;flex:1;}
.topbar-sub{font-size:12px;color:#5C6270;font-family:'JetBrains Mono',monospace;}
.page{padding:24px;flex:1;}

/* Cards */
.card{background:#15171E;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:20px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:#15171E;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px;}
.stat-label{font-size:11.5px;color:#6B7180;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:700;line-height:1;}
.stat-sub{font-size:12px;color:#5C6270;margin-top:4px;}
.stat-accent{color:#6C4FD8;}

/* Table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-family:'JetBrains Mono',monospace;color:#5C6270;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.06);}
td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:20px;}
.badge-green{background:rgba(52,211,153,0.12);color:#34D399;}
.badge-red{background:rgba(248,113,113,0.12);color:#F87171;}
.badge-yellow{background:rgba(251,191,36,0.12);color:#FBBF24;}
.badge-blue{background:rgba(96,165,250,0.12);color:#60A5FA;}
.badge-gray{background:rgba(156,163,175,0.12);color:#9CA3AF;}
.badge-purple{background:rgba(108,79,216,0.15);color:#A990FF;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:10px;font-size:13.5px;font-weight:600;border:none;transition:all .15s;}
.btn-primary{background:#6C4FD8;color:#fff;}
.btn-primary:hover{background:#7B5FE8;}
.btn-ghost{background:rgba(255,255,255,0.06);color:#C8CCDA;}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-danger{background:rgba(248,113,113,0.1);color:#F87171;border:1px solid rgba(248,113,113,0.2);}
.btn-danger:hover{background:rgba(248,113,113,0.18);}
.btn-sm{padding:5px 12px;font-size:12.5px;}
.btn-icon{width:32px;height:32px;padding:0;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;}

/* Inputs */
.input{background:#0E1016;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 13px;font-size:13.5px;color:#E8EAF0;width:100%;outline:none;transition:border-color .15s;}
.input:focus{border-color:#6C4FD8;}
.input::placeholder{color:#4A5060;}
select.input{cursor:pointer;}
.form-label{font-size:12px;color:#7C828F;margin-bottom:5px;display:block;}
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#15171E;border:1px solid rgba(255,255,255,0.08);border-radius:20px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:28px;}
.modal-lg{max-width:700px;}
.modal-xl{max-width:860px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);}

/* Room plan */
.floor-block{margin-bottom:20px;}
.floor-label{font-size:12px;font-family:'JetBrains Mono',monospace;color:#5C6270;letter-spacing:.8px;margin-bottom:10px;}
.room-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.room-card{background:#0E1016;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;position:relative;}
.room-card:hover{border-color:rgba(108,79,216,0.4);transform:translateY(-1px);}
.room-card.vacant{border-color:rgba(52,211,153,0.25);}
.room-card.occupied{border-color:rgba(248,113,113,0.25);}
.room-card.repair{border-color:rgba(251,191,36,0.25);}
.room-num{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.room-type{font-size:11px;color:#6B7180;margin-top:2px;}
.room-price{font-size:12px;color:#A990FF;margin-top:4px;font-weight:600;}

/* View switcher */
.view-switch{display:flex;gap:4px;background:#0E1016;border-radius:10px;padding:4px;}
.view-btn{padding:6px 12px;border-radius:7px;font-size:12.5px;border:none;background:transparent;color:#6B7180;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.view-btn.active{background:#1E2130;color:#E8EAF0;}

/* Tabs */
.tabs{display:flex;gap:2px;background:#0E1016;border-radius:10px;padding:4px;margin-bottom:20px;}
.tab{padding:7px 16px;border-radius:7px;font-size:13.5px;border:none;background:transparent;color:#6B7180;cursor:pointer;transition:all .15s;}
.tab.active{background:#1E2130;color:#E8EAF0;font-weight:600;}

/* Checklist */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#0E1016;border-radius:8px;cursor:pointer;}
.perm-item input{accent-color:#6C4FD8;}

/* Search bar */
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.search-input{position:relative;flex:1;}
.search-input svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4;}
.search-input .input{padding-left:36px;}

/* Detail page */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.detail-field{margin-bottom:12px;}
.detail-key{font-size:11.5px;color:#5C6270;margin-bottom:3px;}
.detail-val{font-size:14px;font-weight:500;}

/* Canvas */
canvas{border-radius:10px;cursor:crosshair;touch-action:none;}

/* Responsive */
@media(max-width:900px){
.stat-grid{grid-template-columns:1fr 1fr;}
.sidebar{width:60px;}
.sb-item span,.sb-logo-title,.sb-logo-sub,.sb-section,.sb-uname,.sb-urole{display:none;}
.main{margin-left:60px;}
}
</style>
</head>

function wRate(){return +(S.pay&&S.pay.waterRate!=null?S.pay.waterRate:18);}
function eRate(){return +(S.pay&&S.pay.electricRate!=null?S.pay.electricRate:7);}
// ค่าน้ำ/ค่าไฟ เป็นบาทโดยตรง (waterCost/electricCost) — ข้อมูลเก่าที่เก็บเป็นหน่วย fallback มาคูณอัตรา
function waterCost(p){return p.waterCost!=null?+p.waterCost:(+p.waterUnit||0)*wRate();}
function electricCost(p){return p.electricCost!=null?+p.electricCost:(+p.electricUnit||0)*eRate();}
function payTotal(p){return p.rent + waterCost(p) + electricCost(p) + p.internet + (p.other||0);}
// เรียงบิลจากใหม่สุด → เก่าสุด (เดือนล่าสุดก่อน, แล้ววันที่, แล้วลำดับที่สร้าง)
function sortBillsDesc(arr){return (arr||[]).slice().sort((a,b)=>{
  const m=(b.month||'').localeCompare(a.month||'');if(m)return m;
  const d=(b.date||'').localeCompare(a.date||'');if(d)return d;
  return String(b.id||'').localeCompare(String(a.id||''));
});}
function rstatus(s){return s==='vacant'?'badge-green':s==='occupied'?'badge-red':'badge-yellow';}
function rstatusLabel(s){return s==='vacant'?'ว่าง':s==='occupied'?'ไม่ว่าง':'ซ่อม';}

function bstatus(s){return s==='ยืนยันแล้ว'?'badge-green':s==='รอยืนยัน'?'badge-yellow':'badge-gray';}

function bookingHoldDays(){return +((S.pay&&S.pay.bookingHoldDays)||7);}
// ─── สถานะห้องตามการจอง ───
function freeRoomIfBooked(roomId){const r=S.rooms.find(x=>x.id===roomId);if(r&&r.status==='occupied'&&!r.tenantId){r.status='vacant';persistColl('rooms',r);}}
function occupyRoom(roomId){const r=S.rooms.find(x=>x.id===roomId);if(r&&r.status==='vacant'){r.status='occupied';persistColl('rooms',r);}}
// ยกเลิกการจองอัตโนมัติ ถ้าสถานะยัง "รอยืนยัน" เกินจำนวนวันที่กำหนดนับจากวันจอง
function autoCancelStaleBookings(){
  const now=Date.now(), ms=bookingHoldDays()*86400000;
  (S.bookings||[]).forEach(b=>{
    if(b.status==='รอยืนยัน'&&b.createdAt){
      const t=new Date(b.createdAt).getTime();
      if(!isNaN(t)&&now-t>ms){b.status='ยกเลิก';b.autoCancelled=true;persistColl('bookings',b);freeRoomIfBooked(b.roomId);
        const tn=(S.tenants||[]).find(x=>x.fromBooking===b.id&&x.checkinStatus!=='เข้าพักแล้ว');
        if(tn){S.tenants=S.tenants.filter(x=>x.id!==tn.id);persistRemove('tenants',tn.id);}
      }
    }
  });
}
// ปุ่ม "ยืนยัน" ในหน้าการจอง = ส่งข้อมูลไปสร้างผู้เช่า (ยังไม่หยุดนับถอยหลัง — รอกด "ยืนยันเข้าพัก")
function confirmBookingStay(id){const b=S.bookings.find(x=>x.id===id);if(b){b.sentToTenant=true;occupyRoom(b.roomId);persistColl('bookings',b);createTenantFromBooking(b);}render();}
// ยืนยันการจอง → สร้างข้อมูลผู้เช่าจากที่ผู้จองกรอก แล้วผูกกับห้อง
function createTenantFromBooking(b){
  if(!b)return;
  if((S.tenants||[]).some(t=>t.fromBooking===b.id))return; // กันซ้ำ
  const r=b.roomId?roomOf(b.roomId):null;
  const tenant={id:Samrit.newId(),name:bookName(b)||'-',phone:bookPhone(b)||'',
    address:b.bookerAddress||'',province:b.bookerProvince||'',postal:b.bookerPostal||'',
    roomId:b.roomId||null,checkin:b.date||new Date().toISOString().slice(0,10),checkout:'',
    checkinStatus:'รอเข้าพัก',fromBooking:b.id};
  S.tenants.push(tenant);persistColl('tenants',tenant);
  if(r){r.tenantId=tenant.id;persistColl('rooms',r);}
}
function confirmTenantCheckin(id){
  const t=S.tenants.find(x=>x.id===id);
  if(t){
    t.checkinStatus='เข้าพักแล้ว';persistColl('tenants',t);
    // ยืนยันเข้าพัก → การจองที่ผูกกันถือว่ายืนยันแล้ว หยุดระบบยกเลิกอัตโนมัติ (นับถอยหลัง)
    if(t.fromBooking){const b=S.bookings.find(x=>x.id===t.fromBooking);if(b&&b.status==='รอยืนยัน'){b.status='ยืนยันแล้ว';b.autoCancelled=false;persistColl('bookings',b);}}
  }
  render();
}

function qrSVG(seed,px){
  const N=25,cell=px/N;let s=0;for(const c of (seed||'samrit'))s=(s*31+c.charCodeAt(0))>>>0;
  function rnd(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;}
  const g=new Array(N*N).fill(-1);
  function finder(x,y){for(let i=0;i<7;i++)for(let j=0;j<7;j++){const b=(i===0||i===6||j===0||j===6),inr=(i>=2&&i<=4&&j>=2&&j<=4);g[(y+i)*N+(x+j)]=(b||inr)?1:0;}}
  finder(0,0);finder(N-7,0);finder(0,N-7);
  let rects='';
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){let v=g[y*N+x];if(v===-1)v=rnd()>0.55?1:0;if(v===1)rects+=`<rect x="${(x*cell).toFixed(2)}" y="${(y*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`;}
  return`<svg width="${px}" height="${px}" viewBox="0 0 ${px} ${px}" xmlns="http://www.w3.org/2000/svg"><rect width="${px}" height="${px}" fill="#fff"/><g fill="#0B0C10">${rects}</g></svg>`;
}

async function loadAll(){
  try{
    const d=await Samrit.bootstrapAdmin(SEED);
    S.rooms=(d.rooms||[]).slice().sort((a,b)=>a.number-b.number);S.tenants=d.tenants||[];S.bookings=d.bookings||[];
    S.contracts=d.contracts||[];S.payments=d.payments||[];S.bills=d.bills||[];
    S.users=(d.users||[]).map(u=>({...u,urole:u.role||u.urole}));
    // DEMO mode: portal residents live in a separate localStorage store — merge
    // them in so bills can be addressed to them (LIVE mode already includes them).
    if(Samrit.mode!=='live'&&Samrit.demoAccounts){
      const have=new Set(S.users.map(u=>u.id));
      Samrit.demoAccounts().filter(a=>(a.role||'resident')==='resident'&&!have.has(a.id))
        .forEach(a=>S.users.push({...a,urole:a.role||'resident',perms:a.perms||[]}));
    }
    S.slips=d.slips||[];
    S.pay=d.paySettings&&d.paySettings.banks?d.paySettings:DEFAULT_PAY;
    S.photos=d.photos||{};
    autoCancelStaleBookings();
  }catch(e){console.warn('bootstrap',e.message);}
}
async function boot(){
  await Samrit.init();
  if(Samrit.mode==='live'){
    const u=Samrit.currentUser();
    if(u&&Samrit.isAuthed()&&(u.role==='admin'||u.role==='staff')){S.auth=u;await loadAll();}
    else{S.needLogin=true;}
  }else{
    S.auth={id:'demo-admin',name:'แอดมิน',username:'admin',role:'admin'};
    await loadAll();
  }
  render();
}
async function adminLogin(){
  const u=document.getElementById('alUser')?.value||'';
  const p=document.getElementById('alPass')?.value||'';
  try{
    const user=await Samrit.login(u,p);
    if(user.role!=='admin'&&user.role!=='staff'){Samrit.logout();alert('บัญชีนี้ไม่มีสิทธิ์เข้าระบบหลังบ้าน');return;}
    S.auth=user;S.needLogin=false;await loadAll();render();
  }catch(e){alert(e.message);}
}
function adminLogout(){Samrit.logout();S.auth=null;S.needLogin=true;render();}

// ─── Signature Pad ───────────────────────────────────────────
let sigPad = null;
function initSigPad(){
  const c=document.getElementById('sigCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  ctx.strokeStyle='#A990FF';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  let drawing=false,lx=0,ly=0;
  function pos(e){
    const r=c.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  }
  function down(e){e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fillStyle='#A990FF';ctx.fill();}
  function move(e){e.preventDefault();if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;}
  function up(){drawing=false;}
  c.addEventListener('mousedown',down);c.addEventListener('mousemove',move);c.addEventListener('mouseup',up);c.addEventListener('mouseleave',up);
  c.addEventListener('touchstart',down,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',up);
  sigPad={canvas:c,ctx,clear:()=>{ctx.clearRect(0,0,c.width,c.height);}};
}
function clearSig(){if(sigPad)sigPad.clear();}
function getSig(){return sigPad?sigPad.canvas.toDataURL():'';}

function saveRoom(){
  const f=getFormVals('roomForm');
  const room={...f,number:+f.number,floor:+f.floor,price:+f.price,tenantId:f.tenantId||null};

  let obj;

  else{obj={id:Samrit.newId(),...p,status:p.status||'unpaid'};S.payments.push(obj);}

// Mirror a payment into the resident-facing `bills` collection so the chosen
// resident sees the bill in their portal and can pay it via QR. The bill id is
// derived from the payment id, so editing updates the same bill; clearing the
// resident on a bill removes the resident-facing copy.
function syncBillForPayment(p){
  const billId='bl_'+p.id;
  const idx=S.bills.findIndex(b=>b.id===billId);
  if(p.userId){
    const existing=idx>=0?S.bills[idx]:null;
    const bill={id:billId,userId:p.userId,roomNumber:p.roomNumber,month:p.month,
      rent:p.rent,waterCost:waterCost(p),electricCost:electricCost(p),internet:p.internet,
      status:p.status||'unpaid',date:p.date||'',slip:existing?existing.slip:'',srcPayment:p.id};
    if(idx>=0)S.bills[idx]=bill; else S.bills.push(bill);
    persistColl('bills',bill);
  } else if(idx>=0){
    const removed=S.bills.splice(idx,1)[0];
    persistRemove('bills',removed.id);
  }
}
function deletePayment(id){if(confirm('ลบบิลนี้?')){
  S.payments=S.payments.filter(p=>p.id!==id);persistRemove('payments',id);
  const billId='bl_'+id,bi=S.bills.findIndex(b=>b.id===billId);
  if(bi>=0){S.bills.splice(bi,1);persistRemove('bills',billId);}
  render();}}
async function saveUser(){
  const f=getFormVals('userForm');
  const perms=PERM_LIST.filter((_,i)=>document.getElementById('perm_'+i)?.checked);
  const active=document.getElementById('userActive')?.checked;
  const u={...f,perms,active,role:f.urole,urole:f.urole};
  try{
    if(f._id){
      u.id=f._id;u._new=false;
      const saved=await Samrit.saveUser(u,S.users);
      const i=S.users.findIndex(x=>x.id===f._id);if(i>=0)S.users[i]={...S.users[i],...u,...(saved||{}),urole:u.urole};
    }else{
      u._new=true;u.active=active!==false;
      const saved=await Samrit.saveUser(u,S.users);
      S.users.push({...u,...(saved||{}),id:(saved&&saved.id)||Samrit.newId(),urole:u.urole});
    }
    if(Samrit.mode!=='live')Samrit.saveUser({},S.users);
  }catch(e){alert(e.message);}
  closeModal();
}

function ub(v){return (v===0||v)?`<span style="padding:0 3px">${v}</span>`:'<span style="letter-spacing:1px;white-space:nowrap">…………………</span>';}
function contractDocHTML(f){
  f=f||{};
  const d=f.cdate?new Date(f.cdate):null;
  const monthsTh=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const day=d?d.getDate():'',mth=d?monthsTh[d.getMonth()]:'',be=d?d.getFullYear()+543:'';
  const addr=`บ้านเลขที่ ${ub(f.addrNo)} หมู่บ้าน ${ub(f.village)} ถนน ${ub(f.road)} ตำบล/แขวง ${ub(f.subdistrict)} อำเภอ/เขต ${ub(f.district)} จังหวัด ${ub(f.province)} โทร ${ub(f.phone)}`;
  return `<div lang="th" style="font-family:'Sarabun','TH Sarabun New',serif;line-height:2.0;font-size:14px;color:#111;word-break:normal;overflow-wrap:break-word">
    <div style="text-align:center;font-weight:700;font-size:18px;margin-bottom:14px">สัญญาเช่าห้องพัก</div>
    <div style="text-align:right">ทำที่ ${ub(f.place)}</div>
    <div style="text-align:right">วันที่ ${ub(day)} เดือน ${ub(mth)} พ.ศ. ${ub(be)}</div>
    <p style="text-indent:2.5em;margin-top:12px">สัญญาเช่าฉบับนี้ทำขึ้นระหว่าง ${ub(f.lessor)} ซึ่งต่อไปในสัญญานี้จะเรียกว่า "ผู้ให้เช่า" ฝ่ายหนึ่ง กับ ${ub(f.lessee)} อยู่ ${addr} ซึ่งต่อไปในสัญญานี้จะเรียกว่า "ผู้เช่า" อีกฝ่ายหนึ่ง คู่สัญญาได้ตกลงกันดังนี้</p>
    <p style="text-indent:2.5em"><b>ข้อ 1.</b> ผู้ให้เช่าตกลงให้เช่าและผู้เช่าตกลงเช่าห้องพักเลขที่ ${ub(f.roomNo)} ชั้นที่ ${ub(f.floor)} ในอาคารของผู้ให้เช่าเพื่อเป็นที่อยู่อาศัยภายใต้ระเบียบที่ผู้ให้เช่ากำหนด โดยเฉพาะไม่ก่อกวน ต้องสงบในยามวิกาล ไม่ทะเลาะวิวาท ไม่ทำผิดศีลธรรมและกฎหมาย</p>
    <p style="text-indent:2.5em"><b>ข้อ 2.</b> ผู้เช่าตกลงชำระค่าเช่าให้แก่ผู้ให้เช่าล่วงหน้า ${ub(f.advMonths)} เดือนและเป็นรายเดือน โดยกำหนดชำระค่าเช่าภายในวันที่ ${ub(f.payDay)} ของทุกเดือน ในอัตราค่าเช่าเดือนละ ${ub(f.rent)} บาท กรณีผู้เช่าชำระล่วงหน้า 1 ปี ผู้ให้เช่ายินยอมลดให้ ${ub(f.advMonths)} เดือน และกรณีผู้เช่าชำระล่วงหน้า ${ub(f.discHalf)} เดือน ผู้ให้เช่ายินยอมลดให้ครึ่งเดือน</p>
    <p style="text-indent:2.5em"><b>ข้อ 3.</b> ผู้เช่าตกลงจะนำค่าเช่ามาชำระให้ ณ ที่ทำการของผู้ให้เช่าหรือตัวแทนภายในกำหนด</p>
    <p style="text-indent:2.5em"><b>ข้อ 4.</b> ห้ามเช่าช่วงเป็นอันขาด เว้นแต่ผู้ให้เช่าตกลงยินยอมด้วยเป็นลายลักษณ์อักษร</p>
    <p style="text-indent:2.5em"><b>ข้อ 5.</b> ค่าน้ำประปา ค่าไฟฟ้า และค่าใช้จ่ายอื่น ถ้ามีให้เรียกเก็บตามอัตราในมิเตอร์หรือโดยเฉลี่ยจากผู้เช่า</p>
    <p style="text-indent:2.5em"><b>ข้อ 6.</b> ผู้เช่าต้องบำรุงรักษาห้องเช่ารวมถึงอุปกรณ์ไฟฟ้า มุ้งลวด กระจกบานเกล็ด กุญแจห้อง กลอนประตู หลอดไฟ ฝาผนัง และอื่น ๆ ให้อยู่ในสภาพที่ดีอยู่เสมอ หากเกิดชำรุดเสียหายไม่ว่าด้วยเหตุใดก็ตาม ผู้เช่าต้องทำให้คืนสู่สภาพเดิมทันที ด้วยค่าใช้จ่ายของผู้เช่า</p>
    <p style="text-indent:2.5em"><b>ข้อ 7.</b> ผู้เช่ามีหน้าที่รักษาความสะอาดตามกฎหมาย ไม่เก็บวัตถุไวไฟหรือสิ่งอันตรายหรือสิ่งต้องห้ามตามกฎหมาย ผู้เช่ายินยอมให้ผู้ให้เช่าเข้าตรวจความถูกต้องเรียบร้อยในห้อง</p>
    <p style="text-indent:2.5em"><b>ข้อ 8.</b> ผู้เช่าจะดัดแปลงต่อเติมหรือรื้อถอนทรัพย์สินที่เช่าทั้งหมดหรือบางส่วนได้ ต่อเมื่อได้รับความยินยอมเป็นหนังสือจากผู้ให้เช่า</p>
    <p style="text-indent:2.5em"><b>ข้อ 9.</b> ถ้าผู้เช่าผิดสัญญาไม่ชำระค่าเช่าตามกำหนดไว้ในข้อ 2. ผู้ให้เช่ามีสิทธิกลับเข้าครอบครองทรัพย์สินที่เช่าตามสัญญานี้โดยฉับพลัน และผู้เช่ายอมให้ผู้ให้เช่าย้ายบุคคลหรือทรัพย์สินของผู้เช่าออกไปจากทรัพย์ที่เช่าตามสัญญานี้</p>
    <p style="text-indent:2.5em"><b>ข้อ 10.</b> ผู้เช่ามีหน้าที่แจ้งให้ผู้ให้เช่าทราบล่วงหน้าในการเลิกเช่าไม่น้อยกว่าสามสิบวันจึงจะได้รับเงินล่วงหน้าคืน หรืออยู่อาศัยโดยหักจากการชำระล่วงหน้าตามข้อ 2</p>
    <p style="text-indent:2.5em"><b>ข้อ 11.</b> ในวันทำสัญญานี้ ผู้เช่าได้ตรวจตราทรัพย์สินที่เช่าแล้วเห็นว่ามีสภาพปกติดีทุกประการ และผู้ให้เช่าได้ส่งมอบทรัพย์สินที่ให้แก่ผู้เช่าแล้ว</p>
    <p style="text-indent:2.5em"><b>ข้อ 12.</b> ผู้เช่าได้มอบสำเนาบัตรประจำตัว สำเนาทะเบียนบ้านและเอกสารแสดงตัวตามกฎหมายที่ไม่หมดอายุ พร้อมรูปถ่าย ${ub(f.photoCount)} รูป ให้ไว้กับผู้ให้เช่า</p>
    <p style="text-indent:2.5em">คู่สัญญาทั้งสองฝ่ายได้อ่านและทำความเข้าใจดีแล้ว จึงลงลายมือชื่อไว้เป็นหลักฐาน</p>
    <table style="width:100%;margin-top:34px;border-collapse:collapse"><tr>
      <td style="text-align:center;padding:14px 8px">ลงชื่อ…………………………ผู้เช่า<br>(…………………………)</td>

    </tr></table>
  </div>`;
}

function ensurePdfMake(cb){
  const setup=()=>{try{if(!window.SARABUN_VFS)throw new Error('ไม่พบฟอนต์ไทยในหน้า');if(!window.__pdfFontsReady){pdfMake.addVirtualFileSystem(window.SARABUN_VFS);pdfMake.setFonts({Sarabun:{normal:'Sarabun-Regular.ttf',bold:'Sarabun-Bold.ttf'}});window.__pdfFontsReady=true;}cb();}catch(e){alert('ตั้งค่าฟอนต์ PDF ไม่สำเร็จ: '+e.message);}};
  if(window.pdfMake){setup();return;}
  const s=document.createElement('script');s.src='app/pdfmake.min.js';s.onload=setup;s.onerror=()=>alert('โหลดตัวสร้าง PDF ไม่สำเร็จ (ต้องมีไฟล์ app/pdfmake.min.js)');document.head.appendChild(s);
}
function downloadResidentContract(id){
  const c=S.contracts.find(x=>x.id===id);if(!c)return;
  ensurePdfMake(()=>{try{pdfMake.createPdf(contractDocDef(c.cform)).download('สัญญาเช่า_'+(c.tenantName||'')+'.pdf');}catch(e){alert('สร้าง PDF ไม่สำเร็จ: '+e.message);}});
}
function confirmResidentContract(id){const c=S.contracts.find(x=>x.id===id);if(c){c.status='ยืนยันแล้ว';persistColl('contracts',c);}render();}
function deleteResidentContract(id){if(!confirm('ลบสัญญานี้? (ลบแล้วกู้คืนไม่ได้)'))return;S.contracts=S.contracts.filter(c=>c.id!==id);persistRemove('contracts',id);if(S.modal)closeModal();render();}
function renderContracts(){
  const q=S.search.toLowerCase();

  const rows=S.contracts.filter(c=>!c.resident&&(!q||(c.tenantName||'').toLowerCase().includes(q)));
  return`
  <div class="topbar"><div class="topbar-title">สัญญาเช่า</div></div>
  <div class="page">
    <div class="search-bar">
      <div class="search-input" style="max-width:320px">
        ${ico.search}<input id="srch" class="input" placeholder="ค้นหาสัญญา..." value="${S.search}" oninput="S.search=this.value;render()">
      </div>
    </div>
    <div class="card"><div class="table-wrap"><table>
      <tr><th>ผู้เช่า</th><th>ห้อง</th><th>วันที่ส่ง</th><th>เอกสารเซ็น</th><th>สถานะ</th><th></th></tr>
      ${resContracts.length?resContracts.map(c=>`<tr>

        <td>${fmtDate(c.submittedAt)||'-'}</td>
        <td>${c.signedDoc?`<button class="btn btn-sm btn-ghost" style="color:#34D399" onclick="openModal('viewSignedContract','${c.id}')">${ico.eye} เอกสารเซ็น</button>`:`<span style="color:#5C6270;font-size:12px">ยังไม่อัปโหลด</span>`}</td>
        <td><span class="badge ${c.status==='ยืนยันแล้ว'?'badge-green':'badge-yellow'}">${c.status==='ยืนยันแล้ว'?'ยืนยันแล้ว':'รอยืนยัน'}</span></td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-sm btn-ghost" onclick="openModal('viewResidentContract','${c.id}')">${ico.eye} ดู</button>
          <button class="btn btn-sm btn-ghost" onclick="downloadResidentContract('${c.id}')">${ico.doc||''} โหลด</button>
          ${c.status!=='ยืนยันแล้ว'?`<button class="btn btn-sm btn-primary" onclick="confirmResidentContract('${c.id}')">ยืนยัน</button>`:''}
          <button class="btn btn-icon btn-danger" onclick="deleteResidentContract('${c.id}')">${ico.trash}</button>
        </div></td>
      </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;color:#5C6270;padding:30px">ยังไม่มีสัญญาจากผู้เช่า</td></tr>`}
    </table></div></div>
  </div>`;
}

// ─── Payments CRUD ───────────────────────────────────────────

      ${rows.map(p=>`<tr>
        <td><span style="font-family:'JetBrains Mono',monospace;font-weight:700">0${p.roomNumber}</span></td>
        <td>${p.tenantName}${p.userId?` <span class="badge badge-green" style="font-size:9.5px;vertical-align:middle">${ico.pay} ส่งให้ผู้ใช้แล้ว</span>`:''}</td>
        <td>${p.month}</td>
        <td>฿${fmtMoney(p.rent)}</td>
        <td>฿${fmtMoney(waterCost(p))}</td>
        <td>฿${fmtMoney(electricCost(p))}</td>
        <td>฿${p.internet}</td>
        <td style="font-weight:700">฿${fmtMoney(payTotal(p))}</td>
        <td><span class="badge ${pstatus(p.status)}">${pstatusLabel(p.status)}</span></td>
        <td>
          <div style="display:flex;gap:4px">
            <button class="btn btn-icon btn-ghost" onclick="openModal('receipt','${p.id}')" title="ใบเสร็จ">${ico.receipt}</button>
            <button class="btn btn-icon btn-ghost" onclick="openModal('editPayment','${p.id}')" title="แก้ไข">${ico.edit}</button>
            <button class="btn btn-icon btn-danger" onclick="deletePayment('${p.id}')" title="ลบ">${ico.trash}</button>
          </div>
        </td>

        <td><span class="badge ${roleBadge(ro)}">${roleLabel(ro)}</span></td>

          </div>

          ${S.pay.qr?`<button class="btn btn-danger btn-sm" onclick="clearQR()">ลบรูป</button>`:''}
        </div>
        <div style="font-size:11.5px;color:${ppReady?'#34D399':'#5C6270'};margin-top:8px">${ppReady?'✓ QR จริง — แต่ละบิลจะสร้าง QR พร้อมยอดเงินอัตโนมัติ':(S.pay.qr?'ใช้รูป QR ที่อัปโหลด':'ใส่เบอร์พร้อมเพย์เพื่อสร้าง QR จริง')}</div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin:18px 0 12px">
          <div style="font-weight:700">บัญชีธนาคาร</div>
          <button class="btn btn-ghost btn-sm" onclick="addBank()">${ico.plus} เพิ่มบัญชี</button>
        </div>

          <div class="form-row"><div class="form-group"><label class="form-label">ธนาคาร</label><input class="input" value="${b.bank}" onchange="setBankField(${i},'bank',this.value)"></div>

        <div style="font-size:12px;color:#5C6270;margin-top:6px">บันทึกอัตโนมัติ — ข้อมูลจะแสดงในหน้าชำระเงินของผู้พักอาศัยทันที</div>

          <td>

              ${s.status!=='อนุมัติ'?`<button class="btn btn-sm btn-ghost" onclick="setSlipStatus('${s.id}','อนุมัติ')" style="color:#34D399">อนุมัติ</button>`:''}
              ${s.status!=='ปฏิเสธ'?`<button class="btn btn-sm btn-ghost" onclick="setSlipStatus('${s.id}','ปฏิเสธ')" style="color:#F87171">ปฏิเสธ</button>`:''}

// ─── Modals ──────────────────────────────────────────────────
function renderModal(){
  if(!S.modal)return'';
  const {modal:type,modalData:data}=S;

  if(type==='quickPrice'){
    const r=roomOf(data);
    if(!r)return'';
    return modal(`แก้ไขราคาห้อง ${String(r.number).padStart(2,'0')}`,`
      <form id="quickPriceForm">
        <input type="hidden" name="_id" value="${r.id}">
        <div class="form-group">
          <label class="form-label">ราคา/เดือน (฿)</label>
          <input name="price" class="input" type="number" value="${r.price}" autofocus style="font-size:22px;text-align:center;padding:14px">
        </div>
        <div style="font-size:12px;color:#5C6270;margin-top:2px">ราคาปัจจุบัน: ฿${fmtMoney(r.price)} · จะถูกดึงอัตโนมัติเมื่อสร้างบิล</div>
      </form>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="saveQuickPrice()">บันทึก</button>`);

  if(type==='addRoom'||type==='editRoom'){

    return modal('addRoom'===type?'เพิ่มห้อง':'แก้ไขห้อง',`

        ${r?`<input type="hidden" name="_id" value="${r.id}">`:''}
        <div class="form-row">
          <div class="form-group"><label class="form-label">เลขห้อง</label><input name="number" class="input" type="number" value="${r?.number||''}" required></div>
          <div class="form-group"><label class="form-label">ชั้น</label><select name="floor" class="input">

          <div class="form-group"><label class="form-label">ประเภท</label><select name="type" class="input">

          </select></div>

        </div>

          <div class="form-group"><label class="form-label">สถานะ</label><select name="status" class="input">
            ${[['vacant','ว่าง'],['occupied','ไม่ว่าง'],['repair','ซ่อม']].map(([v,l])=>`<option value="${v}"${r?.status===v?' selected':''}>${l}</option>`).join('')}
          </select></div>
        </div>
      </form>

        <label class="form-label">รูปภาพห้อง (ผู้พักอาศัยดูได้)</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">
          ${roomPhotos(r.id).map((p,i)=>`<div style="position:relative"><img src="${p}" style="width:72px;height:56px;object-fit:cover;border-radius:8px"><button onclick="removeRoomPhoto('${r.id}',${i})" style="position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;border:none;background:#F87171;color:#fff;font-weight:700;font-size:12px;line-height:1">×</button></div>`).join('')||`<span style="color:#5C6270;font-size:12.5px;align-self:center">ยังไม่มีรูปภาพ</span>`}
        </div>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">${ico.plus} เพิ่มรูปภาพ<input type="file" accept="image/*" onchange="onRoomPhotoUpload('${r.id}',this)" style="display:none"></label>
        <div style="font-size:11.5px;color:#5C6270;margin-top:6px">บันทึกอัตโนมัติ (รูปภาพ/แก้ไขข้อมูลห้องกดบันทึกแยกกัน)</div>

      </div>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button>${b.status==='รอยืนยัน'?`<button class="btn btn-primary" onclick="confirmBookingStay('${b.id}');closeModal()">${ico.check||''} ยืนยันเข้าพัก</button>`:''}`,'modal-lg');
  }
  if(type==='addBooking'||type==='editBooking'){
    const b=type==='editBooking'?S.bookings.find(x=>x.id===data):null;
    return modal(b?'แก้ไขการจอง':'เพิ่มการจอง',`
      <form id="bookingForm">
        ${b?`<input type="hidden" name="_id" value="${b.id}">`:''}
        <div class="form-row">
          <div class="form-group"><label class="form-label">ชื่อผู้จอง</label><input name="name" class="input" value="${b?bookName(b):''}" required></div>
          <div class="form-group"><label class="form-label">โทรศัพท์</label><input name="phone" class="input" value="${b?bookPhone(b):''}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">ห้องที่จอง</label><select name="roomId" class="input">
            ${S.rooms.filter(r=>r.status==='vacant'||r.id===b?.roomId).map(r=>`<option value="${r.id}"${b?.roomId===r.id?' selected':''}>ห้อง ${r.number} ชั้น ${r.floor}</option>`).join('')}
          </select></div>
          <div class="form-group"><label class="form-label">วันที่จอง</label><input name="date" class="input" type="date" value="${b?.date||new Date().toISOString().slice(0,10)}"></div>
        </div>
        <div class="form-group"><label class="form-label">สถานะ</label><select name="status" class="input">
          ${['รอยืนยัน','ยืนยันแล้ว','ยกเลิก'].map(s=>`<option${b?.status===s?' selected':''}>${s}</option>`).join('')}
        </select></div>
      </form>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="saveBooking()">บันทึก</button>`);
  }

  if(type==='addPayment'||type==='editPayment'){
    const p=type==='editPayment'?S.payments.find(x=>x.id===data):null;
    return modal(p?'แก้ไขบิล':'เพิ่มบิล',`
      <form id="paymentForm">
        ${p?`<input type="hidden" name="_id" value="${p.id}">`:''}
        <div class="form-row">
          <div class="form-group"><label class="form-label">ห้อง</label><select name="roomId" class="input" id="payRoomSel" onchange="onPayRoomChange(this.value)">
            ${S.rooms.map(r=>`<option value="${r.id}"${p?.roomId===r.id?' selected':''}>ห้อง ${r.number}</option>`).join('')}
          </select></div>
          <div class="form-group"><label class="form-label">ชื่อผู้เช่า</label><input name="tenantName" id="payTenantName" class="input" value="${p?.tenantName||''}"></div>
        </div>
        <div class="form-group">
          <label class="form-label">ส่งบิลให้ผู้พักอาศัย (บัญชีผู้ใช้)</label>
          <select name="userId" class="input">
            <option value="">— ไม่ส่งให้ผู้ใช้ (เก็บไว้ในระบบ) —</option>
            ${residentAccounts().map(u=>`<option value="${u.id}"${p?.userId===u.id?' selected':''}>${u.name} (${u.username})</option>`).join('')}
          </select>
          <div style="font-size:11.5px;color:#5C6270;margin-top:5px">เลือกบัญชีผู้พักอาศัยเพื่อให้บิลไปแสดงในพอร์ทัลและชำระผ่าน QR ได้</div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">เดือน</label><input name="month" class="input" type="month" value="${p?.month||new Date().toISOString().slice(0,7)}"></div>
          <div class="form-group"><label class="form-label">เลขห้อง</label><input name="roomNumber" id="payRoomNum" class="input" type="number" value="${p?.roomNumber||''}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">ค่าเช่า (฿)</label><input name="rent" id="payRent" class="input" type="number" value="${p?.rent||3500}" oninput="updateBillCalc()"></div>
          <div class="form-group"><label class="form-label">ค่าน้ำ (฿)</label><input name="waterCost" class="input" type="number" value="${p?waterCost(p):0}" oninput="updateBillCalc()"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">ค่าไฟ (฿)</label><input name="electricCost" class="input" type="number" value="${p?electricCost(p):0}" oninput="updateBillCalc()"></div>
          <div class="form-group"><label class="form-label">ค่าเน็ต (฿)</label><input name="internet" class="input" type="number" value="${p?.internet||300}" oninput="updateBillCalc()"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">ค่าอื่นๆ (฿)</label><input name="other" class="input" type="number" value="${p?.other||0}" oninput="updateBillCalc()"></div>
          <div class="form-group"><label class="form-label">สถานะ</label><select name="status" class="input">
            ${[['unpaid','รอชำระ'],['paid','ชำระแล้ว'],['overdue','เกินกำหนด']].map(([v,l])=>`<option value="${v}"${p?.status===v?' selected':''}>${l}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">วันชำระ</label><input name="date" class="input" type="date" value="${p?.date||''}"></div>
          <div class="form-group"><label class="form-label">วิธีชำระ</label><select name="method" class="input">
            ${['','เงินสด','โอนเงิน'].map(m=>`<option${p?.method===m?' selected':''}>${m}</option>`).join('')}
          </select></div>
        </div>
      </form>
      <div id="billCalcPreview" style="background:#0E1016;border-radius:10px;padding:12px 14px;margin-top:4px"></div>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="savePayment()">บันทึก</button>`,'modal-lg');
  }

  if(type==='addUser'||type==='editUser'){
    const u=type==='editUser'?S.users.find(x=>x.id===data):null;
    return modal(u?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้',`
      <form id="userForm">
        ${u?`<input type="hidden" name="_id" value="${u.id}">`:''}
        <div class="form-row">
          <div class="form-group"><label class="form-label">ชื่อ-สกุล</label><input name="name" class="input" value="${u?.name||''}" required></div>
          <div class="form-group"><label class="form-label">Username</label><input name="username" class="input" value="${u?.username||''}" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">รหัสผ่าน</label><input name="password" class="input" type="password" placeholder="${u?'ไม่เปลี่ยนหากว่าง':'รหัสผ่าน'}"></div>
          <div class="form-group"><label class="form-label">บทบาท</label><select name="urole" class="input">
            <option value="admin"${(u?.urole||u?.role)==='admin'?' selected':''}>แอดมิน</option>
            <option value="staff"${(u?.urole||u?.role)==='staff'?' selected':''}>พนักงาน</option>
            <option value="resident"${(u?.urole||u?.role)==='resident'?' selected':''}>ผู้พักอาศัย</option>
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">อีเมล</label><input name="email" class="input" value="${u?.email||''}"></div>
          <div class="form-group"><label class="form-label">โทรศัพท์</label><input name="phone" class="input" value="${u?.phone||''}"></div>
        </div>
        <div class="form-group" ${(u?.urole||u?.role)==='resident'?'style="display:none"':''}>
          <label class="form-label">สิทธิ์การใช้งาน</label>
          <div class="perm-grid">
            ${PERM_LIST.map((p,i)=>`<label class="perm-item"><input type="checkbox" id="perm_${i}" ${u?.perms?.includes(p)?'checked':''}>${p}</label>`).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="perm-item" style="background:transparent;padding:0">
            <input type="checkbox" id="userActive" ${u?.active!==false?'checked':''}>
            <span>เปิดใช้งานบัญชี</span>
          </label>
        </div>
      </form>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="saveUser()">บันทึก</button>`);
  }

  if(type==='viewResidentContract'){
    const c=S.contracts.find(x=>x.id===data);
    if(!c)return'';
    return modal('สัญญาเช่า — '+(c.tenantName||''),`
      <div style="background:#fff;color:#111;border-radius:12px;padding:22px;max-height:60vh;overflow:auto">${contractDocHTML(c.cform)}</div>
      <div style="margin-top:12px;font-size:12.5px;color:#5C6270">ส่งเมื่อ ${fmtDate(c.submittedAt)||'-'} · สถานะ: ${c.status||'รอยืนยัน'}</div>
      ${c.signedDoc?`<div style="margin-top:14px;font-weight:700;color:#A990FF">เอกสารที่เซ็นแล้ว (อัปโหลดโดยผู้เช่า)</div>${c.signedDoc.startsWith('data:image')?`<img src="${c.signedDoc}" style="max-width:100%;margin-top:8px;border-radius:10px">`:`<a href="${c.signedDoc}" download="สัญญาเซ็น_${c.tenantName||''}.pdf" class="btn btn-ghost" style="margin-top:8px">${ico.doc||''} เปิด/ดาวน์โหลดไฟล์ที่เซ็น</a>`}`:''}
    `,`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button><button class="btn btn-ghost" onclick="downloadResidentContract('${c.id}')">${ico.doc||''} โหลด PDF</button>${c.status!=='ยืนยันแล้ว'?`<button class="btn btn-primary" onclick="confirmResidentContract('${c.id}');closeModal()">ยืนยันสัญญา</button>`:''}<button class="btn btn-danger" onclick="deleteResidentContract('${c.id}')">${ico.trash||''} ลบ</button>`,'modal-lg');
  }
  if(type==='viewSignedContract'){
    const c=S.contracts.find(x=>x.id===data);
    if(!c||!c.signedDoc)return'';
    return modal('เอกสารที่เซ็นแล้ว — '+(c.tenantName||''),`
      ${c.signedDoc.startsWith('data:image')?`<img src="${c.signedDoc}" style="max-width:100%;border-radius:10px">`:`<div style="padding:30px;text-align:center"><a href="${c.signedDoc}" download="สัญญาเซ็น_${c.tenantName||''}.pdf" class="btn btn-primary">${ico.doc||''} เปิด/ดาวน์โหลดไฟล์</a></div>`}
      <div style="margin-top:10px;font-size:12.5px;color:#5C6270">อัปโหลดเมื่อ ${fmtDate(c.signedAt)||'-'}</div>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button>${c.status!=='ยืนยันแล้ว'?`<button class="btn btn-primary" onclick="confirmResidentContract('${c.id}');closeModal()">ยืนยันสัญญา</button>`:''}`,'modal-lg');
  }
  if(type==='viewContract'||type==='signContract'){
    const c=S.contracts.find(x=>x.id===data);
    if(!c)return'';
    const contractText=`
      <div style="background:#0E1016;border-radius:12px;padding:20px;max-height:320px;overflow-y:auto;font-size:13px;line-height:1.8;color:#C8CCDA">
        <div style="text-align:center;font-weight:700;font-size:15px;margin-bottom:12px">สัญญาเช่าห้องพัก<br>หอพักสัมฤทธิ์</div>
        <p>สัญญาฉบับนี้ทำขึ้น ณ หอพักสัมฤทธิ์ ระหว่าง <strong>นายสมฤทธิ์ ศรีสว่าง</strong> ผู้ให้เช่า และ <strong>${c.tenantName}</strong> ผู้เช่า ตกลงทำสัญญาเช่าห้องพักหมายเลข ${c.roomNumber}</p>
        <p><strong>ข้อ 1.</strong> ผู้ให้เช่าตกลงให้เช่าและผู้เช่าตกลงเช่าห้องพักหมายเลข ${c.roomNumber} อัตราค่าเช่า ฿${fmtMoney(c.rent)} ต่อเดือน</p>
        <p><strong>ข้อ 2.</strong> สัญญาเช่ามีกำหนด 1 ปี ตั้งแต่วันที่ ${fmtDate(c.start)} ถึงวันที่ ${fmtDate(c.end)}</p>
        <p><strong>ข้อ 3.</strong> ผู้เช่าต้องชำระค่าเช่าทุกวันที่ 1-5 ของทุกเดือน หากเกินกำหนดจะมีค่าปรับ 100 บาทต่อวัน</p>
        <p><strong>ข้อ 4.</strong> ผู้เช่าต้องชำระค่าน้ำในอัตรา 18 บาทต่อหน่วย ค่าไฟในอัตรา 7 บาทต่อหน่วย</p>
        <p><strong>ข้อ 5.</strong> ผู้เช่าต้องวางเงินประกันจำนวน 2 เดือน ซึ่งจะคืนให้ภายใน 30 วันหลังสิ้นสุดสัญญา</p>
        <p><strong>ข้อ 6.</strong> ผู้เช่าต้องรักษาห้องพักให้สะอาดเป็นระเบียบ ห้ามดัดแปลงแก้ไขโครงสร้าง</p>
        <p><strong>ข้อ 7.</strong> ห้ามนำสัตว์เลี้ยงเข้ามาในหอพักโดยเด็ดขาด</p>
        <p><strong>ข้อ 8.</strong> ห้ามส่งเสียงดังรบกวนผู้อื่นหลังเวลา 22.00 น.</p>
        <p><strong>ข้อ 9.</strong> ผู้เช่าต้องแจ้งล่วงหน้า 30 วันก่อนออกห้องพัก</p>
        <p><strong>ข้อ 10.</strong> ผู้ให้เช่ามีสิทธิ์บอกเลิกสัญญาทันทีหากผู้เช่าผิดสัญญา</p>
        <p><strong>ข้อ 11.</strong> หากทรัพย์สินของหอพักเสียหายผู้เช่าต้องรับผิดชอบค่าซ่อมแซม</p>
        <p><strong>ข้อ 12.</strong> ข้อพิพาทใดๆ ให้ถือเอาคำตัดสินของศาลจังหวัดเป็นที่สุด</p>
      </div>`;
    if(type==='viewContract'){
      return modal('ดูสัญญาเช่า',`${contractText}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
          <div style="padding:12px;background:#0E1016;border-radius:10px">
            <div class="detail-key">สถานะ</div>
            <span class="badge ${cstatus(c.status)}">${c.status==='active'?'มีผล':'หมดอายุ'}</span>
          </div>
          <div style="padding:12px;background:#0E1016;border-radius:10px">
            <div class="detail-key">การเซ็น</div>
            <span class="badge ${c.signed?'badge-green':'badge-yellow'}">${c.signed?'เซ็นแล้ว':'รอเซ็น'}</span>
          </div>
        </div>
        ${c.signed&&c.signature&&c.signature.startsWith('data:image')?`
        <div style="margin-top:14px;padding:14px;background:#0E1016;border-radius:10px">
          <div class="detail-key" style="margin-bottom:8px">ลายเซ็นผู้เช่า</div>
          <img src="${c.signature}" style="width:100%;max-height:110px;object-fit:contain;border-radius:6px;background:#181b23">
        </div>`:''}
      `,`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button>${!c.signed?`<button class="btn btn-primary" onclick="openModal('signContract','${c.id}')">${ico.sign} เซ็นสัญญา</button>`:''}`,
      'modal-lg');
    }
    return modal('เซ็นสัญญาออนไลน์',`${contractText}
      <div style="margin-top:16px">
        <div class="form-label" style="margin-bottom:8px">ลายเซ็นผู้เช่า</div>
        <canvas id="sigCanvas" width="460" height="120" style="background:#0E1016;width:100%;border:1px solid rgba(255,255,255,0.1)"></canvas>
        <button class="btn btn-ghost btn-sm" onclick="clearSig()" style="margin-top:8px">ล้างลายเซ็น</button>
      </div>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="signContract('${c.id}')">${ico.sign} ยืนยันเซ็นสัญญา</button>`,
    'modal-lg');
  }

  if(type==='viewSlip'){
    const s=(S.slips||[]).find(x=>x.id===data);
    if(!s)return'';
    return modal('หลักฐานการโอนเงิน',`
      <div style="text-align:center;margin-bottom:14px">${s.slip?`<img src="${s.slip}" style="max-width:100%;max-height:50vh;border-radius:12px;border:1px solid rgba(255,255,255,0.1)">`:'<div style="color:#5C6270;padding:40px">ไม่มีรูปสลิป</div>'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="padding:10px;background:#0E1016;border-radius:10px"><div class="detail-key">ผู้โอน</div><div class="detail-val">${s.name||'-'}</div></div>
        <div style="padding:10px;background:#0E1016;border-radius:10px"><div class="detail-key">ยอด</div><div class="detail-val" style="color:#A990FF">฿${fmtMoney(s.amount||0)}</div></div>
        <div style="padding:10px;background:#0E1016;border-radius:10px"><div class="detail-key">ห้อง / ประเภท</div><div class="detail-val">ห้อง ${s.roomNumber} · ${s.kind||'-'}</div></div>
        <div style="padding:10px;background:#0E1016;border-radius:10px"><div class="detail-key">สถานะ</div><div class="detail-val"><span class="badge ${s.status==='อนุมัติ'?'badge-green':s.status==='ปฏิเสธ'?'badge-red':'badge-yellow'}">${s.status}</span></div></div>
      </div>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button>${s.status!=='อนุมัติ'?`<button class="btn btn-primary" onclick="setSlipStatus('${s.id}','อนุมัติ');closeModal()">อนุมัติการชำระ</button>`:''}`,'modal-lg');
  }

  if(type==='receipt'){
    const p=S.payments.find(x=>x.id===data);
    if(!p)return'';
    return modal('ใบเสร็จรับเงิน',`
      <div style="background:#0E1016;border-radius:12px;padding:20px">
        <div style="text-align:center;margin-bottom:16px">
          <div style="font-weight:700;font-size:16px">หอพักสัมฤทธิ์</div>
          <div style="font-size:11px;color:#5C6270;font-family:'JetBrains Mono',monospace">SAMRIT RESIDENCE</div>
          <div style="font-size:12px;color:#5C6270;margin-top:4px">ใบเสร็จรับเงิน</div>
        </div>
        <div style="border-top:1px dashed rgba(255,255,255,0.1);padding-top:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ห้อง</span><span style="font-weight:600">0${p.roomNumber}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ผู้เช่า</span><span>${p.tenantName}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">เดือน</span><span>${p.month}</span></div>
          ${p.date?`<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">วันชำระ</span><span>${fmtDate(p.date)}</span></div>`:''}
          ${p.method?`<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">วิธีชำระ</span><span>${p.method}</span></div>`:''}
        </div>
        <div style="border-top:1px dashed rgba(255,255,255,0.1);padding-top:14px;margin-top:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ค่าเช่า</span><span>฿${fmtMoney(p.rent)}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ค่าน้ำ</span><span>฿${fmtMoney(waterCost(p))}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ค่าไฟ</span><span>฿${fmtMoney(electricCost(p))}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ค่าอินเทอร์เน็ต</span><span>฿${fmtMoney(p.internet)}</span></div>
          ${p.other?`<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">อื่นๆ</span><span>฿${fmtMoney(p.other)}</span></div>`:''}
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700;font-size:15px">รวมทั้งสิ้น</span>
          <span style="font-weight:700;font-size:20px;color:#A990FF">฿${fmtMoney(payTotal(p))}</span>
        </div>
        <div style="text-align:center;margin-top:12px">
          <span class="badge ${pstatus(p.status)}">${pstatusLabel(p.status)}</span>
        </div>
      </div>
    `,p.status!=='paid'?`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button><button class="btn btn-primary" onclick="markPaid('${p.id}')">บันทึกชำระเงิน</button>`:`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button><button class="btn btn-primary" onclick="window.print()">พิมพ์</button>`);
  }

  return'';
}

function modal(title,body,footer='',extraClass=''){
  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal ${extraClass}">
    <div class="modal-title">${title}</div>
    ${body}
    <div class="modal-footer">${footer}</div>
  </div></div>`;
}

function onPayRoomChange(roomId){
  const r=roomOf(roomId);
  if(!r)return;
  const tn=document.getElementById('payTenantName');
  const rn=document.getElementById('payRoomNum');
  const rent=document.getElementById('payRent');
  if(tn&&r.tenantId){const t=tenantOf(r.tenantId);if(t)tn.value=t.name;}
  if(rn)rn.value=r.number;
  if(rent)rent.value=r.price;
}
function setRoomStatus(id,s){const r=S.rooms.find(x=>x.id===id);if(r){r.status=s;persistColl('rooms',r);}render();}

// ─── Admin login screen (live mode only) ─────────────────────
function renderLogin(){
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;width:100%">
    <div style="background:#15171E;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:36px;width:100%;max-width:380px">
      <div style="width:46px;height:46px;border-radius:13px;background:linear-gradient(140deg,#7C5CE6,#5234B8);display:flex;align-items:center;justify-content:center;margin-bottom:18px">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 20V9l8-5 8 5v11" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><rect x="9" y="13" width="6" height="7" stroke="#fff" stroke-width="1.6"/></svg>
      </div>
      <div style="font-size:19px;font-weight:700">ระบบจัดการหอพักสัมฤทธิ์</div>
      <div style="font-size:13px;color:#5C6270;margin-bottom:22px">เข้าสู่ระบบสำหรับผู้ดูแล / เจ้าหน้าที่</div>
      <div class="form-group"><label class="form-label">ชื่อผู้ใช้</label><input id="alUser" class="input" value="admin" onkeydown="if(event.key==='Enter')adminLogin()"></div>
      <div class="form-group"><label class="form-label">รหัสผ่าน</label><input id="alPass" class="input" type="password" value="admin1234" onkeydown="if(event.key==='Enter')adminLogin()"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="adminLogin()">เข้าสู่ระบบ</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:#5C6270">ทดสอบ: <span style="color:#A990FF">admin / admin1234</span></div>
    </div>
  </div>`;
}

// ─── Main Render ─────────────────────────────────────────────
function render(){
  const active=document.activeElement;
  const activeId=active?.id;
  const activeStart=active?.selectionStart;
  const activeEnd=active?.selectionEnd;

  if(S.needLogin&&!S.auth){
    document.getElementById('app').innerHTML=renderLogin();
    if(activeId){const el=document.getElementById(activeId);if(el){el.focus();try{if(activeStart!==undefined){el.selectionStart=activeStart;el.selectionEnd=activeEnd;}}catch(_){}}}
    return;
  }

  let content='';
  switch(S.screen){
    case'dashboard':content=renderDashboard();break;
    case'select':content=renderSelect();break;
    case'roomDetail':content=renderRoomDetail();break;
    case'rooms':content=renderRooms();break;
    case'tenants':content=renderTenants();break;
    case'bookings':content=renderBookings();break;
    case'contracts':content=renderContracts();break;
    case'payments':content=renderPayments();break;
    case'paysettings':content=renderPaySettings();break;
    case'users':content=renderUsers();break;
    default:content=renderDashboard();
  }

  document.getElementById('app').innerHTML=`${renderSidebar()}<div class="main">${content}</div>${renderModal()}`;

  if(activeId){
    const el=document.getElementById(activeId);
    if(el){el.focus();try{if(activeStart!==undefined){el.selectionStart=activeStart;el.selectionEnd=activeEnd;}}catch(_){}}
  }
  if(S.modal==='signContract')setTimeout(initSigPad,50);
  if(S.modal==='addPayment'||S.modal==='editPayment')setTimeout(updateBillCalc,50);
}

boot();
</script>
