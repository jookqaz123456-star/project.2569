<html lang="th">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0B0C10;font-family:'IBM Plex Sans Thai',sans-serif;color:#E8EAF0;min-height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#0B0C10;}
::-webkit-scrollbar-thumb{background:#2A2D3A;border-radius:3px;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;}
.auth-left{width:380px;background:linear-gradient(160deg,#1a1340 0%,#0E1016 60%);border-right:1px solid rgba(108,79,216,0.2);padding:48px 40px;display:flex;flex-direction:column;justify-content:center;flex-shrink:0;}
.auth-right{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;}
.auth-logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(140deg,#7C5CE6,#5234B8);display:flex;align-items:center;justify-content:center;margin-bottom:24px;}
.auth-tagline{font-size:24px;font-weight:700;line-height:1.3;margin-bottom:8px;}
.auth-sub{font-size:13.5px;color:#5C6270;line-height:1.6;margin-bottom:36px;}
.auth-stat{display:flex;gap:24px;margin-top:32px;}
.auth-stat-item{text-align:center;}
.auth-stat-num{font-size:24px;font-weight:700;color:#A990FF;}
.auth-stat-label{font-size:11px;color:#5C6270;margin-top:2px;}
.auth-box{background:#15171E;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:36px;width:100%;max-width:420px;}
.auth-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.auth-desc{font-size:13px;color:#5C6270;margin-bottom:24px;}
.auth-tabs{display:flex;gap:4px;background:#0E1016;border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:7px;border-radius:7px;font-size:13.5px;border:none;background:transparent;color:#6B7180;cursor:pointer;transition:all .15s;}
.auth-tab.active{background:#1E2130;color:#E8EAF0;font-weight:600;}

/* App Layout */
.app-wrap{display:flex;min-height:100vh;}
.topnav{position:fixed;top:0;left:0;right:0;height:56px;background:#0E1016;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:100;}
.topnav-logo{font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px;white-space:nowrap;flex-shrink:0;}
.topnav-logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(140deg,#7C5CE6,#5234B8);display:flex;align-items:center;justify-content:center;}
.topnav-menu{display:flex;gap:4px;flex:1;margin-left:16px;}
.nav-item{padding:6px 14px;border-radius:8px;font-size:13.5px;color:#6B7180;cursor:pointer;border:none;background:transparent;transition:all .15s;}
.nav-item:hover{color:#C8CCDA;background:rgba(255,255,255,0.05);}
.nav-item.active{color:#A990FF;background:rgba(108,79,216,0.12);}
.topnav-user{display:flex;align-items:center;gap:10px;margin-left:auto;}
.user-avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,#7C5CE6,#5234B8);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.page-wrap{margin-top:56px;padding:28px 24px;max-width:1200px;margin-left:auto;margin-right:auto;}
.history-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.bill-breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px;background:#0E1016;border-radius:10px;margin-bottom:12px;}

/* Cards */
.card{background:#15171E;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:20px;}
.card-sm{background:#15171E;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px;}

/* Room Cards */
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.room-card{background:#15171E;border:1px solid rgba(255,255,255,0.07);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;}
.room-card:hover{border-color:rgba(108,79,216,0.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.room-card-header{height:100px;display:flex;align-items:center;justify-content:center;position:relative;}
.room-card-floor{font-size:11px;color:#5C6270;position:absolute;top:12px;left:14px;font-family:'JetBrains Mono',monospace;}
.room-card-status{position:absolute;top:10px;right:12px;}
.room-card-num{font-size:40px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#E8EAF0;}
.room-card-body{padding:14px 16px;}
.room-card-type{font-size:12px;color:#6B7180;margin-bottom:4px;}
.room-card-price{font-size:17px;font-weight:700;color:#A990FF;}
.room-card-size{font-size:12px;color:#5C6270;}
.room-card-facs{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;}
.fac-tag{font-size:11px;background:rgba(255,255,255,0.05);border-radius:5px;padding:2px 7px;color:#6B7180;}

/* Filters */
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.filter-input{position:relative;}
.filter-input svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4;}

/* Inputs */
.input{background:#0E1016;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 13px;font-size:13.5px;color:#E8EAF0;width:100%;outline:none;transition:border-color .15s;}
.input:focus{border-color:#6C4FD8;}
.input::placeholder{color:#4A5060;}
select.input{cursor:pointer;}
.form-label{font-size:12px;color:#7C828F;margin-bottom:5px;display:block;}
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:10px;font-size:13.5px;font-weight:600;border:none;transition:all .15s;cursor:pointer;}
.btn-primary{background:#6C4FD8;color:#fff;}
.btn-primary:hover{background:#7B5FE8;}
.btn-ghost{background:rgba(255,255,255,0.06);color:#C8CCDA;}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-danger{background:rgba(248,113,113,0.1);color:#F87171;border:1px solid rgba(248,113,113,0.2);}
.btn-sm{padding:5px 12px;font-size:12.5px;}
.btn-icon{width:32px;height:32px;padding:0;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;}
.btn-outline{background:transparent;border:1px solid rgba(108,79,216,0.4);color:#A990FF;}
.btn-outline:hover{background:rgba(108,79,216,0.1);}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:20px;}
.badge-green{background:rgba(52,211,153,0.12);color:#34D399;}
.badge-red{background:rgba(248,113,113,0.12);color:#F87171;}
.badge-yellow{background:rgba(251,191,36,0.12);color:#FBBF24;}
.badge-blue{background:rgba(96,165,250,0.12);color:#60A5FA;}
.badge-gray{background:rgba(156,163,175,0.12);color:#9CA3AF;}
.badge-purple{background:rgba(108,79,216,0.15);color:#A990FF;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;}

/* Table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-family:'JetBrains Mono',monospace;color:#5C6270;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.06);}
td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#15171E;border:1px solid rgba(255,255,255,0.08);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px;}
.modal-lg{max-width:680px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:14px;padding-bottom:20px;position:relative;}
.tl-item:last-child{padding-bottom:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#6C4FD8;flex-shrink:0;margin-top:4px;}
.tl-line{position:absolute;left:4px;top:14px;bottom:0;width:2px;background:rgba(108,79,216,0.2);}
.tl-item:last-child .tl-line{display:none;}
.tl-content{flex:1;}
.tl-title{font-size:13.5px;font-weight:600;}
.tl-sub{font-size:12px;color:#5C6270;margin-top:2px;}

@media(max-width:640px){
.auth-left{display:none;}
.auth-right{padding:20px;}
.rooms-grid{grid-template-columns:1fr 1fr;gap:12px;}
.topnav{padding:0 12px;gap:6px;}
.topnav-menu{margin-left:4px;gap:2px;justify-content:flex-end;}
.topnav-menu .nav-item span{display:none;}
.nav-item{padding:7px 9px;}
.topnav-user{gap:6px;}
.brand-text{display:none;}
.uname{display:none;}
.history-grid{grid-template-columns:1fr;}
.bill-breakdown{grid-template-columns:repeat(2,1fr);}
.page-wrap{padding:18px 14px;}
}
</style>
</head>

// ─── Helpers ─────────────────────────────────────────────────
function billTotal(b){return b.rent + waterCost(b) + electricCost(b) + b.internet;}
function rstatus(s){return s==='vacant'?'badge-green':s==='occupied'?'badge-red':'badge-yellow';}
function rstatusLabel(s){return s==='vacant'?'ว่าง':s==='occupied'?'ไม่ว่าง':'ซ่อม';}
function pstatus(s){return s==='paid'?'badge-green':'badge-yellow';}
function pstatusLabel(s){return s==='paid'?'ชำระแล้ว':'รอชำระ';}
function bstatus(s){return s==='ยืนยันแล้ว'?'badge-green':s==='รอยืนยัน'?'badge-yellow':'badge-gray';}
function bookingHoldDays(){return +((S.pay&&S.pay.bookingHoldDays)||7);}
// คืนห้องเป็น "ว่าง" เมื่อการจองถูกยกเลิก (เฉพาะห้องที่ไม่ว่างเพราะการจอง ไม่มีผู้เช่าจริง)
function freeRoomIfBooked(roomId){
  const r=roomOf(roomId);
  if(r&&r.status==='occupied'&&!r.tenantId){r.status='vacant';persistColl('rooms',r);}
}
// ยกเลิกการจองอัตโนมัติ ถ้ายัง "รอยืนยัน" เกินจำนวนวันที่กำหนดนับจากวันจอง
function autoCancelStaleBookings(){
  const now=Date.now(), ms=bookingHoldDays()*86400000;
  (S.bookings||[]).forEach(b=>{
    if(b.status==='รอยืนยัน'&&b.createdAt){
      const t=new Date(b.createdAt).getTime();
      if(!isNaN(t)&&now-t>ms){b.status='ยกเลิก';b.autoCancelled=true;persistColl('bookings',b);freeRoomIfBooked(b.roomId);}
    }
  });
}
function fmtMoney(n){return n.toLocaleString('th-TH');}
function fmtDate(d){if(!d)return'ปัจจุบัน';const dt=new Date(d);return dt.toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'});}
function uid(){return 'id'+Date.now()+Math.random().toString(36).slice(2,6);}
function roomOf(id){return S.rooms.find(r=>r.id===id);}
function myBookings(){return S.bookings.filter(b=>b.userId===S.auth?.id);}
function myBills(){return S.bills.filter(b=>b.userId===S.auth?.id).slice().sort((a,b)=>{
  const m=(b.month||'').localeCompare(a.month||'');if(m)return m;
  return (b.date||'').localeCompare(a.date||'');
});}
function myStays(){return S.stays.filter(b=>b.userId===S.auth?.id);}
function myRepairs(){return S.repairs.filter(b=>b.userId===S.auth?.id);}

// faux QR (พรอมต์เพย์จำลอง) — แอดมินอัปโหลดรูป QR จริงทับได้
function qrSVG(seed,px){
  const N=25,cell=px/N;let s=0;for(const c of (seed||'samrit'))s=(s*31+c.charCodeAt(0))>>>0;
  function rnd(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;}
  const g=new Array(N*N).fill(-1);
  function finder(x,y){for(let i=0;i<7;i++)for(let j=0;j<7;j++){const b=(i===0||i===6||j===0||j===6),inr=(i>=2&&i<=4&&j>=2&&j<=4);g[(y+i)*N+(x+j)]=(b||inr)?1:0;}}
  finder(0,0);finder(N-7,0);finder(0,N-7);
  let rects='';
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){let v=g[y*N+x];if(v===-1)v=rnd()>0.55?1:0;if(v===1)rects+=`<rect x="${(x*cell).toFixed(2)}" y="${(y*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`;}
  return`<svg width="${px}" height="${px}" viewBox="0 0 ${px} ${px}" xmlns="http://www.w3.org/2000/svg"><rect width="${px}" height="${px}" fill="#fff"/><g fill="#0B0C10">${rects}</g></svg>`;
}
function qrBox(amount){
  const pay=S.pay||DEFAULT_PAY;
  const ppDigits=(pay.promptpay||'').replace(/[^0-9]/g,'');
  let qr,note;
  if(ppDigits.length>=10 && window.PromptPay){
    // Real, scannable PromptPay QR — encodes this bill's exact amount so every
    // room/bill produces a different QR that opens with the amount pre-filled.
    qr=PromptPay.svg(pay.promptpay, amount, 160);
    note='สแกนด้วยแอปธนาคารใดก็ได้ — ยอดเงินจะถูกกรอกให้อัตโนมัติ';
  }else if(pay.qr){
    qr=`<img src="${pay.qr}" style="width:160px;height:160px;object-fit:contain;display:block">`;
    note='สแกนเพื่อชำระเงิน หรือโอนผ่านบัญชี:';
  }else{
    qr=qrSVG('samrit'+(pay.promptpay||''),160);
    note='สแกนเพื่อชำระเงิน หรือโอนผ่านบัญชี:';
  }
  const amtLine=amount!=null?`<div style="text-align:center;margin-top:8px;font-size:14px;color:#0B0C10;font-weight:700;font-family:'JetBrains Mono',monospace">฿${(+amount).toLocaleString('th-TH',{minimumFractionDigits:2})}</div>`:'';
  const ppLine=ppDigits.length>=10?`<div style="font-size:13px;margin-bottom:10px"><span style="color:#6B7180">พร้อมเพย์:</span> <span style="color:#A990FF;font-family:'JetBrains Mono',monospace">${pay.promptpay}</span></div>`:'';
  const banks=pay.banks.map(b=>`<div style="margin-bottom:10px"><div style="font-weight:600;font-size:13.5px">${b.bank}</div><div style="font-size:13px;color:#A990FF;font-family:'JetBrains Mono',monospace">${b.acc} <span style="color:#6B7180">${b.holder}</span></div></div>`).join('');
  return`<div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap">
    <div style="background:#fff;border-radius:12px;padding:10px;flex-shrink:0">${qr}${amtLine}</div>
    <div style="flex:1;min-width:180px"><div style="font-size:13px;color:#6B7180;margin-bottom:10px">${note}</div>${ppLine}${banks}</div>
  </div>`;
}

async function loadResidentData(){
  try{
    const d=await Samrit.bootstrapResident(SEED);
    S.rooms=(d.rooms||[]).slice().sort((a,b)=>a.number-b.number);S.bookings=d.bookings||[];S.bills=d.bills||[];

  }catch(e){console.warn('bootstrap',e.message);}
}
// Public catalog (rooms/prices/photos) for visitors who haven't logged in yet —
// pulled live from the server so admin changes show up without needing an account.
async function loadPublicData(){
  try{
    const d=await Samrit.bootstrapPublic(SEED);
    S.rooms=(d.rooms||[]).slice().sort((a,b)=>a.number-b.number);
    S.pay=d.paySettings&&d.paySettings.banks?d.paySettings:DEFAULT_PAY;S.photos=d.photos||{};

  else{await loadPublicData();}

}

let payCtx=null; // {kind:'booking'|'bill', roomId/billId, date, slip}
function startBookingPay(roomId){
  const r=roomOf(roomId);
  if(!r||r.status!=='vacant'){alert('ห้องนี้ไม่ว่าง');return;}
  const val=id=>(document.getElementById(id)?.value||'').trim();
  const firstName=val('bookFirstName'),lastName=val('bookLastName');
  const street=val('bookStreet'),postal=val('bookPostal'),district=val('bookDistrict');
  const province=val('bookProvince'),phone=val('bookPhone'),date=val('bookDate');
  if(!firstName||!lastName){alert('กรุณากรอกชื่อและนามสกุล');return;}
  if(!street){alert('กรุณากรอกถนน');return;}
  if(!postal||!/^\d{5}$/.test(postal)){alert('กรุณากรอกรหัสไปรษณีย์ 5 หลัก');return;}
  if(!district){alert('กรุณากรอกอำเภอ/เขต');return;}
  if(!phone||!/^\d{9,10}$/.test(phone)){alert('กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง');return;}
  if(!date){alert('กรุณาเลือกวันที่ต้องการเข้าพัก');return;}
  const name=`${firstName} ${lastName}`;
  const address=`${street} อ./เขต ${district} จ.${province} ${postal}`;
  payCtx={kind:'booking',roomId,date,name,firstName,lastName,street,district,province,postal,phone,address,slip:null};
  openModal('payQR');
}
function startBillPay(billId){
  payCtx={kind:'bill',billId,slip:null};
  openModal('payQR');
}
function onPaySlip(input){
  const f=input.files&&input.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{if(payCtx)payCtx.slip=rd.result;render();};
  rd.readAsDataURL(f);
}
function confirmPay(){
  if(!payCtx)return;
  if(!payCtx.slip){if(!confirm('ยังไม่ได้แนบสลิป ต้องการดำเนินการต่อหรือไม่?'))return;}
  const today=new Date().toISOString().slice(0,10);
  if(payCtx.kind==='booking'){
    const r=roomOf(payCtx.roomId);
    const bk={id:Samrit.newId(),userId:S.auth.id,roomId:payCtx.roomId,roomNumber:r.number,date:payCtx.date,
      name:payCtx.name,phone:payCtx.phone,bookerName:payCtx.name,bookerAddress:payCtx.address,bookerPhone:payCtx.phone,
      bookerFirstName:payCtx.firstName,bookerLastName:payCtx.lastName,bookerStreet:payCtx.street,bookerDistrict:payCtx.district,bookerProvince:payCtx.province,bookerPostal:payCtx.postal,
      status:'รอยืนยัน',createdAt:today,slip:payCtx.slip,amount:BOOK_DEPOSIT};
    S.bookings.push(bk);persistColl('bookings',bk);
    // จองแล้วห้องเปลี่ยนเป็น "ไม่ว่าง" ทันที กันคนอื่นจองซ้ำ
    if(r&&r.status==='vacant'){r.status='occupied';persistColl('rooms',r);}
    pushSlip({roomNumber:r.number,name:payCtx.name||S.auth.name,amount:BOOK_DEPOSIT,slip:payCtx.slip,kind:'จองห้อง',month:''});
    payCtx=null;closeModal();nav('bookings');
  }else{
    const b=S.bills.find(x=>x.id===payCtx.billId);
    if(b){b.status='paid';b.date=today;b.slip=payCtx.slip;persistColl('bills',b);}
    pushSlip({roomNumber:b.roomNumber,name:S.auth.name,amount:billTotal(b),slip:payCtx.slip,kind:'ค่าเช่า',month:b.month});
    payCtx=null;closeModal();render();
  }
}
function cancelBooking(id){
  if(!confirm('ยกเลิกการจองนี้?'))return;
  const b=S.bookings.find(x=>x.id===id);
  if(b){b.status='ยกเลิก';persistColl('bookings',b);freeRoomIfBooked(b.roomId);}
  render();
}
function saveBookingEdit(id){
  const b=S.bookings.find(x=>x.id===id);
  if(!b)return;
  const val=eid=>(document.getElementById(eid)?.value||'').trim();
  const firstName=val('editFirstName'),lastName=val('editLastName');
  const street=val('editStreet'),postal=val('editPostal'),district=val('editDistrict');
  const province=val('editProvince'),phone=val('editPhone'),date=val('editBookDate');
  if(!firstName||!lastName){alert('กรุณากรอกชื่อและนามสกุล');return;}
  if(!street){alert('กรุณากรอกถนน');return;}
  if(!postal||!/^\d{5}$/.test(postal)){alert('กรุณากรอกรหัสไปรษณีย์ 5 หลัก');return;}
  if(!district){alert('กรุณากรอกอำเภอ/เขต');return;}
  if(!phone||!/^\d{9,10}$/.test(phone)){alert('กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง');return;}
  if(!date){alert('กรุณาเลือกวันที่');return;}
  b.date=date;
  b.name=`${firstName} ${lastName}`;b.phone=phone;

}

function renderBrowse(){
  let rooms=S.rooms;
  if(S.filterSearch)rooms=rooms.filter(r=>String(r.number).includes(S.filterSearch)||r.type.includes(S.filterSearch)||r.facilities.some(f=>f.includes(S.filterSearch)));
  if(S.filterType!=='all')rooms=rooms.filter(r=>r.type===S.filterType);
  if(S.filterMinPrice)rooms=rooms.filter(r=>r.price>=+S.filterMinPrice);
  if(S.filterMaxPrice)rooms=rooms.filter(r=>r.price<=+S.filterMaxPrice);
  if(S.filterVacant)rooms=rooms.filter(r=>r.status==='vacant');

  const bg=(s)=>s==='vacant'?'linear-gradient(135deg,#0E2418,#0B1A10)':s==='occupied'?'linear-gradient(135deg,#1A0E14,#120B0E)':'linear-gradient(135deg,#1A1610,#120E08)';

  return`<div class="page-wrap">
    <div style="margin-bottom:20px">
      <h1 style="font-size:22px;font-weight:700;margin-bottom:4px">ค้นหาห้องพัก</h1>
      <p style="font-size:13.5px;color:#6B7180">หอพักสัมฤทธิ์ มี ${S.rooms.filter(r=>r.status==='vacant').length} ห้องว่างพร้อมเข้าพัก</p>
    </div>
    <div class="filter-bar">
      <div class="filter-input" style="flex:1;min-width:180px">
        <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.4" width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input class="input" style="padding-left:36px" placeholder="ค้นหาห้อง..." value="${S.filterSearch}" oninput="S.filterSearch=this.value;render()">
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13.5px;cursor:pointer;white-space:nowrap">
        <input type="checkbox" ${S.filterVacant?'checked':''} onchange="S.filterVacant=this.checked;render()" style="accent-color:#6C4FD8">
        เฉพาะห้องว่าง
      </label>
    </div>
    ${rooms.length===0?`<div style="text-align:center;padding:60px;color:#5C6270">ไม่พบห้องที่ตรงเงื่อนไข</div>`:`
    <div class="rooms-grid">
      ${rooms.map(r=>`
      <div class="room-card" onclick="openModal('roomDetail','${r.id}')">
        <div class="room-card-header" style="background:${bg(r.status)}">
          <div class="room-card-floor">ชั้น ${r.floor}</div>
          <div class="room-card-status"><span class="badge ${rstatus(r.status)}">${rstatusLabel(r.status)}</span></div>
          <div class="room-card-num">${String(r.number).padStart(2,'0')}</div>
        </div>
        <div class="room-card-body">
          <div class="room-card-type">${r.type} · ${r.size}</div>
          <div class="room-card-price">฿${fmtMoney(r.price)}<span style="font-size:12px;color:#5C6270;font-weight:400">/เดือน</span></div>
          <div class="room-card-facs">${r.facilities.slice(0,4).map(f=>`<span class="fac-tag">${f}</span>`).join('')}${r.facilities.length>4?`<span class="fac-tag">+${r.facilities.length-4}</span>`:''}</div>
        </div>
      </div>`).join('')}
    </div>`}
  </div>`;
}

// Swipe/scroll the room photo gallery one frame left (-1) or right (+1).
function scrollGallery(dir){const g=document.getElementById('roomGallery');if(g)g.scrollBy({left:dir*g.clientWidth,behavior:'smooth'});}

// Full-screen photo viewer (uncropped). Appended to <body> so it survives
// re-renders; closes on backdrop/✕/Esc, navigates with arrows/buttons/tap.
function openRoomPhotoFull(roomId,start){
  const photos=roomPhotos(roomId); if(!photos.length)return;
  let idx=start||0;
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9999;display:flex;align-items:center;justify-content:center';
  const img=document.createElement('img');
  img.style.cssText='max-width:96vw;max-height:92vh;object-fit:contain;border-radius:10px;box-shadow:0 12px 50px rgba(0,0,0,.6);'+(photos.length>1?'cursor:pointer':'');
  const cnt=document.createElement('div');
  cnt.style.cssText='position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;background:rgba(0,0,0,.5);padding:4px 12px;border-radius:12px;font-family:JetBrains Mono,monospace';
  const show=()=>{img.src=photos[idx];cnt.textContent=(idx+1)+' / '+photos.length;};
  const close=()=>{o.remove();document.removeEventListener('keydown',onKey);};
  const nav=(d)=>{idx=(idx+d+photos.length)%photos.length;show();};
  const onKey=(e)=>{if(e.key==='Escape')close();else if(e.key==='ArrowLeft')nav(-1);else if(e.key==='ArrowRight')nav(1);};
  o.onclick=(e)=>{if(e.target===o)close();};
  img.onclick=(e)=>{e.stopPropagation();if(photos.length>1)nav(1);};
  const xbtn=document.createElement('button');
  xbtn.textContent='✕';
  xbtn.style.cssText='position:absolute;top:16px;right:20px;width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:20px;cursor:pointer';
  xbtn.onclick=(e)=>{e.stopPropagation();close();};
  o.appendChild(img); o.appendChild(xbtn);
  if(photos.length>1){
    [['‹',-1,'left:14px'],['›',1,'right:14px']].forEach(([t,d,pos])=>{
      const b=document.createElement('button');
      b.textContent=t;
      b.style.cssText='position:absolute;'+pos+';top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:28px;line-height:1;cursor:pointer';
      b.onclick=(e)=>{e.stopPropagation();nav(d);};
      o.appendChild(b);
    });
    o.appendChild(cnt);
  }
  document.addEventListener('keydown',onKey);
  document.body.appendChild(o); show();
}

// ─── Modals ──────────────────────────────────────────────────
function renderModal(){
  if(!S.modal)return'';
  const {modal:type,modalData:data}=S;

  if(type==='roomDetail'){
    const r=S.rooms.find(x=>x.id===data);
    if(!r)return'';
    const photos=roomPhotos(r.id);
    // Single swipeable gallery — all photos live in one strip you can scroll/swipe;
    // status badge sits at the very top so it's visible before the room number.
    const statusTop=`<div style="position:absolute;top:12px;right:12px;z-index:4"><span class="badge ${rstatus(r.status)}">${rstatusLabel(r.status)}</span></div>`;
    const numTag=`<div style="position:absolute;left:14px;bottom:10px;z-index:3;font-size:36px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.7)">${String(r.number).padStart(2,'0')}</div>`;
    const header=photos.length?`
      <div style="position:relative;border-radius:12px;overflow:hidden;margin-bottom:16px">
        ${statusTop}
        <div id="roomGallery" style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch">
          ${photos.map((p,i)=>`<div style="flex:0 0 100%;scroll-snap-align:center;min-width:100%"><img src="${p}" onclick="openRoomPhotoFull('${r.id}',${i})" style="width:100%;height:clamp(280px,56vh,460px);object-fit:cover;display:block;cursor:zoom-in"></div>`).join('')}
        </div>

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">จังหวัด<span style="color:#F87171">*</span></label><select id="bookProvince" class="input">${THAI_PROVINCES.map(p=>`<option${p==='กรุงเทพมหานคร'?' selected':''}>${p}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">โทรศัพท์<span style="color:#F87171">*</span></label><input id="bookPhone" class="input" type="tel" inputmode="numeric" maxlength="10" placeholder="เบอร์ติดต่อ"></div>
      </div>
      <div class="form-group"><label class="form-label">วันที่ต้องการเข้าพัก<span style="color:#F87171">*</span></label><input id="bookDate" class="input" type="date" value="${new Date(Date.now()+86400000*7).toISOString().slice(0,10)}"></div>
      <div style="font-size:12px;color:#5C6270">ค่าจอง ฿${fmtMoney(BOOK_DEPOSIT)} (หักจากค่าเช่าเดือนแรก)</div>
    `,`<button class="btn btn-ghost" onclick="openModal('roomDetail','${r.id}')">ย้อนกลับ</button><button class="btn btn-primary" onclick="startBookingPay('${r.id}')">ดำเนินการชำระเงิน →</button>`);
  }

  if(type==='editBooking'){
    const b=S.bookings.find(x=>x.id===data);
    if(!b)return'';
    const prov=b.bookerProvince||'กรุงเทพมหานคร';
    return modal('แก้ไขข้อมูลการจอง',`
      <div style="margin-bottom:12px;font-size:13.5px;color:#6B7180">ห้อง ${b.roomNumber} · การจอง ${b.id}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">ชื่อ</label><input id="editFirstName" class="input" value="${b.bookerFirstName||''}"></div>
        <div class="form-group"><label class="form-label">นามสกุล</label><input id="editLastName" class="input" value="${b.bookerLastName||''}"></div>
      </div>
      <div class="form-group"><label class="form-label">ถนน</label><input id="editStreet" class="input" value="${b.bookerStreet||''}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">รหัสไปรษณีย์</label><input id="editPostal" class="input" type="text" inputmode="numeric" maxlength="5" value="${b.bookerPostal||''}"></div>
        <div class="form-group"><label class="form-label">อำเภอ/เขต</label><input id="editDistrict" class="input" value="${b.bookerDistrict||''}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">จังหวัด</label><select id="editProvince" class="input">${THAI_PROVINCES.map(p=>`<option${p===prov?' selected':''}>${p}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">โทรศัพท์</label><input id="editPhone" class="input" type="tel" inputmode="numeric" maxlength="10" value="${b.bookerPhone||b.phone||''}"></div>
      </div>
      <div class="form-group"><label class="form-label">วันที่ต้องการเข้าพัก</label><input id="editBookDate" class="input" type="date" value="${b.date}"></div>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="saveBookingEdit('${b.id}')">บันทึก</button>`);
  }

  if(type==='receipt'){
    const b=S.bills.find(x=>x.id===data);
    if(!b)return'';
    return modal('ใบเสร็จรับเงิน',`
      <div style="background:#0E1016;border-radius:12px;padding:20px">
        <div style="text-align:center;margin-bottom:16px">
          <div style="font-weight:700;font-size:16px">หอพักสัมฤทธิ์</div>
          <div style="font-size:11px;color:#5C6270;font-family:'JetBrains Mono',monospace">SAMRIT RESIDENCE</div>
          <div style="font-size:12px;color:#5C6270;margin-top:4px">ใบเสร็จรับเงิน</div>
        </div>
        <div style="border-top:1px dashed rgba(255,255,255,0.1);padding-top:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ห้อง</span><span style="font-weight:600">${b.roomNumber}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">เดือน</span><span>${b.month}</span></div>
          ${b.date?`<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">วันชำระ</span><span>${fmtDate(b.date)}</span></div>`:''}
        </div>
        <div style="border-top:1px dashed rgba(255,255,255,0.1);padding-top:14px;margin-top:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ค่าเช่า</span><span>฿${fmtMoney(b.rent)}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ค่าน้ำ</span><span>฿${fmtMoney(waterCost(b))}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">ค่าไฟ</span><span>฿${fmtMoney(electricCost(b))}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span style="color:#6B7180">อินเทอร์เน็ต</span><span>฿${fmtMoney(b.internet)}</span></div>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700;font-size:15px">รวมทั้งสิ้น</span>
          <span style="font-weight:700;font-size:20px;color:#A990FF">฿${fmtMoney(billTotal(b))}</span>
        </div>
        <div style="text-align:center;margin-top:12px"><span class="badge ${pstatus(b.status)}">${pstatusLabel(b.status)}</span></div>
      </div>
    `,`<button class="btn btn-ghost" onclick="closeModal()">ปิด</button><button class="btn btn-primary" onclick="window.print()">พิมพ์</button>`);
  }

  if(type==='payQR'){
    if(!payCtx)return'';
    let amount,title,desc,btnLabel;
    if(payCtx.kind==='booking'){
      const r=roomOf(payCtx.roomId);
      amount=BOOK_DEPOSIT;
      title='ชำระเงินมัดจำการจอง';
      desc=`ห้อง ${String(r.number).padStart(2,'0')} ชั้น ${r.floor} · เข้าพัก ${fmtDate(payCtx.date)}`;
      btnLabel='ยืนยันจองห้องพักและแจ้งชำระเงิน';
    }else{
      const b=S.bills.find(x=>x.id===payCtx.billId);
      amount=billTotal(b);
      title='ชำระค่าเช่า / ค่าบริการ';
      desc=`เดือน ${b.month} — ห้อง ${b.roomNumber}`;
      btnLabel='ยืนยันการชำระเงิน';
    }
    return modal(title,`
      <div style="background:#0E1016;border-radius:14px;padding:20px;margin-bottom:4px">
        <div style="font-size:13.5px;color:#6B7180;margin-bottom:14px">ยอดที่ต้องชำระ: <span style="font-size:18px;font-weight:700;color:#A990FF">฿${fmtMoney(amount)}</span></div>
        ${qrBox(amount)}
        ${slipUploadField()}
      </div>
      <div style="font-size:12px;color:#5C6270;margin-top:10px">${desc}</div>
    `,`<button class="btn btn-ghost" onclick="payCtx=null;closeModal()">ยกเลิก</button><button class="btn btn-primary" onclick="confirmPay()">✓ ${btnLabel}</button>`);
  }

  return'';
}

function modal(title,body,footer=''){
  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal modal-lg">
    <div class="modal-title">${title}</div>
    ${body}
    <div class="modal-footer">${footer}</div>
  </div></div>`;
}

// ─── Main Render ─────────────────────────────────────────────
function render(){
  const active=document.activeElement;
  const activeId=active?.id;
  const activeStart=active?.selectionStart;
  const activeEnd=active?.selectionEnd;

  if(!S.auth){
    document.getElementById('app').innerHTML=renderAuth();
    return;
  }

  let content='';
  switch(S.screen){
    case'browse':content=renderBrowse();break;
    case'bookings':content=renderBookings();break;
    case'payments':content=renderPayments();break;
    case'history':content=renderHistory();break;
    default:content=renderBrowse();
  }

  document.getElementById('app').innerHTML=`${renderTopNav()}<div>${content}</div>${renderModal()}`;

  // ปิด autocomplete/autofill ของเบราว์เซอร์ (กล่องแนะนำสีขาว) ทุกช่องกรอก
  document.querySelectorAll('#app input').forEach(i=>{i.setAttribute('autocomplete','off');i.setAttribute('autocorrect','off');i.setAttribute('spellcheck','false');});

  if(activeId){
    const el=document.getElementById(activeId);
    if(el){el.focus();try{if(activeStart!==undefined){el.selectionStart=activeStart;el.selectionEnd=activeEnd;}}catch(_){}}
  }
}

boot();
</script>
</body>
</html>
