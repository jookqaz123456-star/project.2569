# Render.com blueprint — deploy the full app (frontend + API + database).
# 1. Push this repo to GitHub.
# 2. On render.com: New → Blueprint → connect the repo. Render reads this file.
# 3. Set MONGODB_URI in the dashboard (see below), then Deploy.
#    You get a URL like https://samrit-residence.onrender.com
#
# DATA PERSISTENCE:
#   • Set MONGODB_URI  → data lives in MongoDB Atlas and SURVIVES redeploys. ✅
#   • Leave it unset   → falls back to a local SQLite file, which RESETS on the
#                        free plan (ephemeral disk). Fine for a quick demo only.
services:
  - type: web
    name: samrit-residence
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node --experimental-sqlite server/server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret
      - key: NODE_VERSION
        value: "22.22.2"
      - key: MONGODB_URI
        sync: false           # ← paste your MongoDB Atlas connection string in the dashboard
      # - key: MONGODB_DB     # optional, defaults to "samrit"
      #   value: samrit
